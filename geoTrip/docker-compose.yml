version: '3.9'

services:
  birdappbase:
    image: mongo:latest
    container_name: "geotripbase"
    ports:
      - 27017:27017

  keyclock:
    image: quay.io/keycloak/keycloak:25.0.5
    container_name: keyclock_geoTrip
    ports:
      - 9090:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - keycloak_data:/opt/keycloak/data
    command:
      - 'start-dev'

volumes:
  keycloak_data:
